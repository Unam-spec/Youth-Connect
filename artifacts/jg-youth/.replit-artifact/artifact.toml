kind = "web"
previewPath = "/"
title = "Jeremiah Generation"
version = "1.0.0"
id = "artifacts/jg-youth"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19077

[services.development]
run = "pnpm --filter @workspace/jg-youth run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/jg-youth", "run", "build" ]
publicDir = "artifacts/jg-youth/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19077"
BASE_PATH = "/"
